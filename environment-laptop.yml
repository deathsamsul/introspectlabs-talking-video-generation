name: ditto-laptop

channels:
  - pytorch
  - nvidia
  - defaults

dependencies:
  - python=3.10.16
  - pip

  # PyTorch
  - pytorch=2.5.1
  - torchvision=0.20.1
  - torchaudio=2.5.1
  - pytorch-cuda=12.1

  # Common scientific packages
  - numpy=2.0.1
  - pillow=11.0.0
  - pyyaml=6.0.2
  - requests
  - setuptools
  - wheel

  - pip:
      - audioread==3.0.1
      - cython==3.0.11
      - filetype==1.2.0
      - imageio==2.36.1
      - imageio-ffmpeg==0.5.1
      - librosa==0.10.2.post1
      - opencv-python-headless==4.10.0.84
      - scikit-image==0.25.0
      - scikit-learn==1.6.0
      - scipy==1.15.0
      - soundfile==0.13.0
      - soxr==0.5.0.post1
      - tqdm==4.67.1
      - polygraphy
      - colored
